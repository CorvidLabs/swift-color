name: ubuntu

on:
  push:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/**"
      - ".specsync/**"
      - "specs/**"
      - "fledge.toml"
      - ".trust.toml"
      - ".augur.toml"
      - ".attest.json"
      - "AGENTS.md"
  pull_request:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/**"
      - ".specsync/**"
      - "specs/**"
      - "fledge.toml"
      - ".trust.toml"
      - ".augur.toml"
      - ".attest.json"
      - "AGENTS.md"

concurrency:
  group: ubuntu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    container: swift:6.0
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v5
    - name: Build
      run: swift build -v
    - name: Run tests
      run: swift test -v
