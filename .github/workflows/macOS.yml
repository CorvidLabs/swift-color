name: macOS

on:
  push:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/**"
      - ".specsync/**"
      - "specs/**"
      - "fledge.toml"
      - ".trust.toml"
      - ".augur.toml"
      - ".attest.json"
      - "AGENTS.md"
  pull_request:
    branches: [main]
    paths:
      - "Sources/**"
      - "Tests/**"
      - "Package.swift"
      - "Package.resolved"
      - ".github/**"
      - ".specsync/**"
      - "specs/**"
      - "fledge.toml"
      - ".trust.toml"
      - ".augur.toml"
      - ".attest.json"
      - "AGENTS.md"

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macOS:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v5
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
    - name: Build
      run: swift build -v
    - name: Run tests
      run: swift test -v
